<style>
  /* ============ デザイントークン ============ */
  :root {
    --bg: #F6F4EF;
    --surface: #FFFFFF;
    --paper: #FDFCF9;
    --ink: #26221C;
    --muted: #8A857C;
    --line: #E4E0D7;
    --accent: #2F5AA8;
    --accent-soft: #E7EDF8;
    --danger: #C4372C;
    --danger-soft: #F9E9E7;
    --shadow: 0 2px 10px rgba(38,34,28,.08);
    --radius: 14px;
    --tap: 48px;
    --edge: 20px;
  }
  [data-theme="dark"] {
    --bg: #17181C;
    --surface: #22242A;
    --paper: #ECE9E2;      /* 紙は常に明るく＝インクの視認性を維持 */
    --ink: #E8E5DE;
    --muted: #9A968E;
    --line: #34363E;
    --accent: #7FA7E8;
    --accent-soft: #2A3550;
    --danger: #E06055;
    --danger-soft: #43272A;
    --shadow: 0 2px 12px rgba(0,0,0,.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    overscroll-behavior: none;
    touch-action: manipulation;
  }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
  button:focus-visible, input:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }

  /* ============ 画面共通 ============ */
  .screen { position: fixed; inset: 0; display: none; flex-direction: column; background: var(--bg); }
  .screen.active { display: flex; }

  .appbar {
    display: flex; align-items: center; gap: 4px;
    padding: calc(env(safe-area-inset-top, 0px) + 10px) 10px 10px;
    background: var(--surface); border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .appbar h1 { font-size: 18px; font-weight: 700; letter-spacing: .04em; flex: 1; display: flex; align-items: baseline; gap: 6px; }
  .version-badge {
    font-size: 11px; font-weight: 700; color: var(--accent);
    background: var(--accent-soft); border-radius: 8px;
    padding: 2px 7px; letter-spacing: 0;
  }
  .icon-btn {
    min-width: 44px; min-height: var(--tap);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 20px; border-radius: 12px; flex-shrink: 0;
  }
  .icon-btn:active { background: var(--accent-soft); }
  .back-btn { font-size: 16px; font-weight: 600; color: var(--accent); padding: 0 6px; min-height: var(--tap); flex-shrink: 0; }

  /* ============ 一覧画面 ============ */
  #folder-bar { padding: 10px 16px 0; }
  #btn-folder-switch {
    display: flex; align-items: center; gap: 6px;
    max-width: 100%; height: 40px; padding: 0 14px 0 12px;
    background: var(--accent-soft); border: 1px solid var(--line); border-radius: 20px;
    color: var(--accent); font-size: 14px; font-weight: 700;
  }
  #btn-folder-switch:active { opacity: .8; }
  #btn-folder-switch .folder-icon { font-size: 15px; flex-shrink: 0; }
  #btn-folder-switch .folder-label {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 55vw;
  }
  #btn-folder-switch .chev { font-size: 11px; opacity: .8; flex-shrink: 0; }
  #search-wrap { padding: 12px 16px 4px; }
  #search {
    width: 100%; height: 44px; padding: 0 16px;
    border: 1px solid var(--line); border-radius: 22px;
    background: var(--surface); color: var(--ink); font-size: 16px;
    -webkit-user-select: text; user-select: text;
  }
  #search::placeholder { color: var(--muted); }
  #note-list { flex: 1; overflow-y: auto; padding: 12px 16px calc(env(safe-area-inset-bottom, 0px) + 96px); }
  .note-card {
    width: 100%; text-align: left;
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); margin-bottom: 14px; overflow: hidden;
  }
  .note-card:active { transform: scale(.985); }
  .note-card.pinned { border-color: var(--accent); box-shadow: 0 2px 10px rgba(47,90,168,.16); }
  .note-card .thumb {
    display: block; width: 100%; height: 130px; object-fit: cover; object-position: top left;
    background: #FDFCF9; border-bottom: 1px solid var(--line);
  }
  .note-card .info { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; padding: 12px 14px; }
  .note-card .title { font-size: 15px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: flex; align-items: baseline; gap: 4px; min-width: 0; }
  .note-card .title .pin-mark { flex-shrink: 0; font-size: 12px; }
  .note-card .title .title-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .note-card .time { font-size: 12px; color: var(--muted); flex-shrink: 0; }
  .section-header {
    font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: .04em;
    padding: 4px 4px 8px; display: flex; align-items: center; gap: 4px;
  }
  .section-header.pinned-header { color: var(--accent); }
  #empty-state { text-align: center; color: var(--muted); padding: 64px 24px; font-size: 14px; line-height: 1.9; }
  #fab {
    position: fixed; right: 20px; bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
    height: 56px; padding: 0 22px; border-radius: 28px;
    background: var(--accent); color: #fff; font-size: 16px; font-weight: 700;
    box-shadow: 0 4px 14px rgba(47,90,168,.4);
    display: flex; align-items: center; gap: 6px;
  }
  #fab:active { transform: scale(.95); }

  /* ============ 編集画面 ============ */
  #editor-title {
    flex: 1; min-width: 0; text-align: center;
    font-size: 16px; font-weight: 600;
    background: transparent; border: none;
    border-bottom: 1.5px dashed transparent;
    color: var(--ink); padding: 8px 2px; border-radius: 0;
    -webkit-user-select: text; user-select: text;
  }
  #editor-title:focus { border-bottom-color: var(--accent); outline: none; }
  #editor-title::placeholder { color: var(--muted); }

  /* 編集画面：フォルダ / ピン留め メタバー */
  .editor-meta-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; background: var(--surface); border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .meta-chip {
    height: 34px; border-radius: 17px; font-size: 13px; font-weight: 600;
    display: inline-flex; align-items: center; gap: 5px; padding: 0 12px;
    background: var(--bg); border: 1px solid var(--line); color: var(--ink);
  }
  .meta-chip:active { background: var(--accent-soft); }
  #btn-note-folder { flex: 1; min-width: 0; }
  #btn-note-folder .folder-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
  #btn-pin { flex-shrink: 0; }
  #btn-pin.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ============ ボトムシート（フォルダ選択） ============ */
  .sheet-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.32);
    z-index: 60; opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .sheet-overlay.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 61;
    background: var(--surface); border-radius: 20px 20px 0 0;
    box-shadow: 0 -4px 24px rgba(0,0,0,.18);
    padding: 10px 16px calc(env(safe-area-inset-bottom, 0px) + 16px);
    max-height: 72vh; display: flex; flex-direction: column;
    transform: translateY(100%); transition: transform .22s ease;
  }
  .sheet.open { transform: translateY(0); }
  .sheet-handle { width: 40px; height: 4px; border-radius: 2px; background: var(--line); margin: 2px auto 12px; flex-shrink: 0; }
  .sheet h2 { font-size: 15px; font-weight: 700; margin-bottom: 10px; flex-shrink: 0; }
  #folder-sheet-list { overflow-y: auto; flex: 1; margin-bottom: 8px; }
  .folder-row {
    display: flex; align-items: center; gap: 10px;
    width: 100%; min-height: 52px; padding: 4px 8px; border-radius: 12px;
    text-align: left;
  }
  .folder-row:active { background: var(--accent-soft); }
  .folder-row.selected { background: var(--accent-soft); }
  .folder-row .folder-row-icon { font-size: 17px; flex-shrink: 0; }
  .folder-row .folder-row-name {

  /* ============ 縦向き固定（凍結ロック方式） ============
   * 旧方式（横向き検知→CSS transform:rotateで回転）は、実際に
   * ビューポートがリサイズされてから演出で戻すため、その過程で
   * resize/orientationchangeが発火してlayoutCanvasが再計算され、
   * ガタつき・キャンバスのズレが発生していた。
   *
   * 新方式：横向きへの変化そのものを検知させない。
   * ロックON時点の「縦向きの実ピクセルサイズ」をJSで一度だけ取得し、
   * <html>に position:fixed + 固定px の width/height をインラインstyleで

  html.force-portrait {

  html.force-portrait body {

</style>

<script>
"use strict";
/* =====================================================
 * てがきメモ v5  (tegaki-memo_2026-07-02_v5)
 * 単一ファイル / バニラJS / IndexedDB永続化
 * v5: タイトル入力バグ修正（body の user-select:none を
 *     #canvas-area のみに限定）
 *     / ピン留め機能（一覧最上部への固定・視覚区分）
 *     / フォルダ分け機能（IndexedDB folders ストア追加）
 * v4: IndexedDB完全移行（旧localStorage自動移行）
 *     / ベース層ビットマップ化＝保存・サムネイル処理をO(1)に
 *     / Web Share APIによる画像共有（非対応時DLフォールバック)
 *     / フルスクリーン解除ボタンの視認性改善
 * ===================================================== */

/* ---------- アプリバージョン（PWA更新管理の一元定数） ---------- */
const APP_VERSION = "5.3.1";

/* ---------- 定数 ---------- */
const DB_NAME = "tegaki-db", DB_VER = 2;
const EDGE_PX = 20;
const THIN_DIST = 1.4;
const ZOOM_MIN = 0.5, ZOOM_MAX = 4;
const GESTURE_GRACE = 200;
const BQ = 2;   // ベース層（サムネイル・保存用）のノート解像度倍率
const PEN_WIDTHS = [2.5, 4.5, 8];
const PEN_COLORS = ["#26221C", "#2F5AA8", "#C4372C", "#1E7A46"];
const BGS = [
  { id: "dot",   label: "ドット" },
  { id: "line",  label: "横線" },
  { id: "plain", label: "無地" },
  { id: "grid4", label: "4分割" },
  { id: "grid9", label: "9分割" }
];

const $ = (id) => document.getElementById(id);

/* =====================================================
 * IndexedDB レイヤー（バニラJS直実装）
 *  - notes   : メタ情報 {id,title,updatedAt,w,h,bg,thumb}
 *  - strokes : 描画データ {id, strokes:[...]}（分離して一覧を高速化）
 *  - settings: アプリ設定 {key:"app", ...}
 * ===================================================== */
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const rq = indexedDB.open(DB_NAME, DB_VER);
    rq.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains("notes"))    d.createObjectStore("notes",    { keyPath: "id" });
      if (!d.objectStoreNames.contains("strokes"))  d.createObjectStore("strokes",  { keyPath: "id" });
      if (!d.objectStoreNames.contains("settings")) d.createObjectStore("settings", { keyPath: "key" });
      if (!d.objectStoreNames.contains("folders"))  d.createObjectStore("folders",  { keyPath: "id" });
    };
    rq.onsuccess = () => resolve(rq.result);
    rq.onerror = () => reject(rq.error || new Error("IndexedDBを開けませんでした"));
    rq.onblocked = () => reject(new Error("IndexedDBが他のタブでロックされています"));
  });
}
function idb(storeName, mode, fn) {
  return new Promise((resolve, reject) => {
    if (!db) { reject(new Error("DB未初期化")); return; }
    let request = null;
    try {
      const tx = db.transaction(storeName, mode);
      const store = tx.objectStore(storeName);
      request = fn(store) || null;
      tx.oncomplete = () => resolve(request ? request.result : undefined);
      tx.onerror = () => reject(tx.error);
      tx.onabort = () => reject(tx.error || new Error("トランザクション中断"));
    } catch (e) { reject(e); }
  });
}
const dbGet    = (s, k) => idb(s, "readonly",  st => st.get(k));
const dbGetAll = (s)    => idb(s, "readonly",  st => st.getAll());
const dbPut    = (s, v) => idb(s, "readwrite", st => st.put(v));
const dbDel    = (s, k) => idb(s, "readwrite", st => st.delete(k));
const dbClear  = (s)    => idb(s, "readwrite", st => st.clear());

/* ---- 旧localStorage（v1〜v3）からの自動マイグレーション ---- */
async function migrateFromLocalStorage() {
  let raw = null;
  try { raw = localStorage.getItem("tegaki.meta"); } catch { return; }
  if (!raw) return;
  try {
    const oldMeta = JSON.parse(raw) || [];
    for (const n of oldMeta) {
      if (!n.id) continue;
      if (!n.bg) n.bg = "dot";
      if (typeof n.isPinned !== "boolean") n.isPinned = false;
      if (!("folderId" in n)) n.folderId = null;
      let strokes = [];
      try { strokes = JSON.parse(localStorage.getItem("tegaki.note." + n.id) || "[]"); } catch {}
      await dbPut("notes", n);
      await dbPut("strokes", { id: n.id, strokes });
    }
    try {
      const oldSet = JSON.parse(localStorage.getItem("tegaki.settings") || "null");
      if (oldSet) await dbPut("settings", Object.assign({ key: "app" }, oldSet));
    } catch {}
    // 移行成功後にのみ旧データを削除
    for (const n of oldMeta) { try { localStorage.removeItem("tegaki.note." + n.id); } catch {} }
    try { localStorage.removeItem("tegaki.meta"); localStorage.removeItem("tegaki.settings"); } catch {}
    if (oldMeta.length) toast(`${oldMeta.length}件のメモを新しいデータベースへ移行しました`);
  } catch (e) {
    console.error("migration failed:", e);
    toast("旧データの移行に失敗しました（旧データは残っています）");
  }
}

  history.pushState({ screen: name, id: id || null }, "");

  if (screens.editor.classList.contains("active") && name !== "editor") leaveEditor();

/* =====================================================
 * メモ一覧画面
 * ===================================================== */
function relTime(t) {
  const d = Date.now() - t;
  const m = Math.floor(d / 60000);
  if (m < 1) return "たった今";
  if (m < 60) return m + "分前";
  const h = Math.floor(m / 60);
  if (h < 24) return h + "時間前";
  const days = Math.floor(h / 24);
  if (days < 30) return days + "日前";
  return new Date(t).toLocaleDateString("ja-JP");
}

function folderName(id) {
  if (id === null || id === undefined) return "すべてのメモ";
  const f = folders.find(f => f.id === id);
  return f ? f.name : "すべてのメモ";
}
function updateFolderBar() {
  $("folder-bar-label").textContent = folderName(currentFolderId);
}
function makeNoteCard(n) {
  const card = document.createElement("button");
  card.className = "note-card" + (n.isPinned ? " pinned" : "");
  const img = document.createElement("img");
  img.className = "thumb"; img.alt = ""; img.loading = "lazy";
  if (n.thumb) img.src = n.thumb; else img.style.display = "none";
  const info = document.createElement("div");
  info.className = "info";
  const title = document.createElement("span");
  title.className = "title";
  if (n.isPinned) {
    const pin = document.createElement("span");
    pin.className = "pin-mark"; pin.textContent = "📌";
    title.appendChild(pin);
  }
  const titleText = document.createElement("span");
  titleText.className = "title-text"; titleText.textContent = n.title;
  title.appendChild(titleText);
  const time = document.createElement("span");
  time.className = "time"; time.textContent = "最終更新: " + relTime(n.updatedAt);
  info.append(title, time);
  card.append(img, info);
  card.addEventListener("click", () => navigate("editor", n.id));
  return card;
}
function renderList() {
  updateFolderBar();
  const q = $("search").value.trim().toLowerCase();
  const list = $("note-list");
  list.innerHTML = "";
  const items = meta
    .filter(n => currentFolderId === null || n.folderId === currentFolderId)
    .filter(n => !q || (n.title || "").toLowerCase().includes(q));

  if (!items.length) {
    const d = document.createElement("div");
    d.id = "empty-state";
    d.textContent = !dbReady ? "読み込み中…"
      : q ? "「" + $("search").value + "」に一致するメモはありません。"
          : currentFolderId !== null ? "このフォルダにはまだメモがありません。"
          : "まだメモがありません。右下の「＋ 新規メモ」から書き始められます。";
    list.appendChild(d);
    return;
  }

  const pinned = items.filter(n => n.isPinned).sort((a, b) => b.updatedAt - a.updatedAt);
  const rest = items.filter(n => !n.isPinned).sort((a, b) => b.updatedAt - a.updatedAt);

  if (pinned.length) {
    const h = document.createElement("div");
    h.className = "section-header pinned-header";
    h.textContent = "📌 ピン留め";
    list.appendChild(h);
    for (const n of pinned) list.appendChild(makeNoteCard(n));
    if (rest.length) {
      const h2 = document.createElement("div");
      h2.className = "section-header";
      h2.textContent = "その他のメモ";
      list.appendChild(h2);
    }
  }
  for (const n of rest) list.appendChild(makeNoteCard(n));
}
$("search").addEventListener("input", renderList);

/* =====================================================
 * 手書きエンジン（編集画面）
 * ===================================================== */
const canvas = $("canvas");
const ctx = canvas.getContext("2d");
const off = document.createElement("canvas");    // 画面表示用の確定層（現在ズームでシャープ）
const offCtx = off.getContext("2d");
const base = document.createElement("canvas");   // ノート解像度の常設ベース層（サムネ・保存用 / O(1)）
const baseCtx = base.getContext("2d");
let scale = 1, dpr = 1;

let view = { z: 1, tx: 0, ty: 0 };
let viewAtOff = { z: 1, tx: 0, ty: 0 };
let paperColor = "#FDFCF9";
let thumbDirty = true;

function viewIsCommitted() {
  return view.z === viewAtOff.z && view.tx === viewAtOff.tx && view.ty === viewAtOff.ty;
}
function clampViewPan() {
  view.z = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, view.z));
  const vw = canvas.width / dpr, vh = canvas.height / dpr;
  const W = cur.note.w * scale * view.z, H = cur.note.h * scale * view.z;
  const loX = Math.min(0, vw - W), hiX = Math.max(0, vw - W);
  const loY = Math.min(0, vh - H), hiY = Math.max(0, vh - H);
  view.tx = Math.min(hiX, Math.max(loX, view.tx));
  view.ty = Math.min(hiY, Math.max(loY, view.ty));
}
function setViewTransform(c, v) {
  const k = dpr * scale * v.z;
  c.setTransform(k, 0, 0, k, dpr * v.tx, dpr * v.ty);
  c.lineCap = "round";
  c.lineJoin = "round";
}

async function openEditor(id) {
  const note = meta.find(n => n.id === id);
  if (!note) { history.back(); return; }
  if (!note.bg) note.bg = "dot";
  if (typeof note.isPinned !== "boolean") note.isPinned = false;
  if (!("folderId" in note)) note.folderId = null;
  let strokes = [];
  try {
    const rec = await dbGet("strokes", id);
    strokes = (rec && Array.isArray(rec.strokes)) ? rec.strokes : [];
  } catch (e) { console.error(e); toast("描画データの読み込みに失敗しました"); }
  cur = { id, note, strokes, redo: [] };
  view = { z: 1, tx: 0, ty: 0 };
  thumbDirty = false;
  setFullscreen(false, true);
  $("editor-title").value = note.title;
  applyBg(note.bg);
  updatePinButton();
  updateNoteFolderLabel();
  setStatus("保存済み ✓", false, true);
  requestAnimationFrame(() => {
    if (!cur || cur.id !== id) return;
    layoutCanvas(); rebuildBase(); redrawAll(); updateButtons();
  });
}

function leaveEditor() {
  if (!cur) return;
  flushSave();
  setFullscreen(false, true);
  cur = null;
}

function layoutCanvas() {
  if (!cur) return;
  const frame = $("canvas-frame");
  // clientWidth/clientHeight は transform（縦向き固定の回転演出）の影響を受けないため、
  // 論理サイズ（メモのデータ座標系）を正しく維持できる
  const w = frame.clientWidth, h = frame.clientHeight;
  if (w < 10) return;
  if (!cur.note.w) { cur.note.w = Math.round(w); cur.note.h = Math.round(h); }
  dpr = Math.min(window.devicePixelRatio || 1, 3);
  scale = w / cur.note.w;
  canvas.width = Math.round(w * dpr);
  canvas.height = Math.round(h * dpr);
  off.width = canvas.width;
  off.height = canvas.height;
  if (base.width !== cur.note.w * BQ) {
    base.width = cur.note.w * BQ;
    base.height = cur.note.h * BQ;
  }
  patternsDirty = true;
  clampViewPan();
}
/* ---- キャンバスの再レイアウト（リサイズ時） ----
 * 「縦向きに固定する」がONの間は、横向きへの変化そのものを
 * 完全に無視する（= layoutCanvasを一切呼ばせない）。
 * これにより「崩れてから戻す」工程自体が存在せず、ガタつきが起きない。
 */
function reflowCanvasSafely() {
  if (!cur || !screens.editor.classList.contains("active")) return;
  const needBase = base.width !== cur.note.w * BQ;
  layoutCanvas();
  if (needBase) rebuildBase();
  redrawAll();
}
let reflowRAF = null, reflowTimer = null;
function scheduleCanvasReflow() {
  if (settings.rotationLock) return;   // ロック中は再計算そのものを完全抑制
  if (reflowRAF) cancelAnimationFrame(reflowRAF);
  if (reflowTimer) clearTimeout(reflowTimer);
  reflowRAF = requestAnimationFrame(reflowCanvasSafely);
  reflowTimer = setTimeout(reflowCanvasSafely, 260);
}
// resize/orientationchange/visualViewportいずれも capture フェーズで最速受信し、
// ロック中であれば即座に握りつぶして下流の処理へ一切伝播させない
function guardedReflow(e) {
  if (settings.rotationLock) {
    reapplyFreezeStyle();   // 念のため凍結スタイルを即座に再アサート（保険）
    return;
  }
  scheduleCanvasReflow();
}
window.addEventListener("resize", guardedReflow, { capture: true });
window.addEventListener("orientationchange", guardedReflow, { capture: true });
if (window.visualViewport) {
  window.visualViewport.addEventListener("resize", guardedReflow, { capture: true });
}
// Android Chrome等では screen.orientation の change が window.orientationchange より
// 早く・確実に発火するため、これも同じガードで拾っておく（保険の多重化）
if (screen.orientation && screen.orientation.addEventListener) {
  screen.orientation.addEventListener("change", guardedReflow);
}

/* ---- 全消去マーカー {m:"x"} 以降のストロークだけが「見えている」内容 ---- */
function visibleStrokes(arr) {
  let last = -1;
  for (let i = arr.length - 1; i >= 0; i--) {
    if (arr[i].m === "x") { last = i; break; }
  }
  return arr.slice(last + 1);
}

/* ---- ストローク描画（中点ベジェで滑らかに） ---- */
function traceStroke(c, s) {
  const p = s.p;
  c.strokeStyle = s.c;
  c.fillStyle = s.c;
  c.lineWidth = s.w;
  c.globalCompositeOperation = s.m === "e" ? "destination-out" : "source-over";
  if (p.length <= 2) {
    c.beginPath();
    c.arc(p[0], p[1], s.w / 2, 0, Math.PI * 2);
    c.fill();
  } else {
    c.beginPath();
    c.moveTo(p[0], p[1]);
    let i = 2;
    for (; i < p.length - 2; i += 2) {
      c.quadraticCurveTo(p[i], p[i + 1], (p[i] + p[i + 2]) / 2, (p[i + 1] + p[i + 3]) / 2);
    }
    c.lineTo(p[i], p[i + 1]);
    c.stroke();
  }
  c.globalCompositeOperation = "source-over";
}

/* ---- ベース層（ノート解像度・ビュー非依存）：ストローク確定時に焼き付け ---- */
function setBaseTransform() {
  baseCtx.setTransform(BQ, 0, 0, BQ, 0, 0);
  baseCtx.lineCap = "round";
  baseCtx.lineJoin = "round";
}
function rebuildBase() {
  baseCtx.save(); baseCtx.setTransform(1, 0, 0, 1, 0, 0);
  baseCtx.clearRect(0, 0, base.width, base.height); baseCtx.restore();
  setBaseTransform();
  for (const s of visibleStrokes(cur.strokes)) traceStroke(baseCtx, s);
}

/* ---- 背景テンプレート（画面用：パターンでズーム追従） ---- */
let patDot = null, patLine = null, patternsDirty = true;
function buildPatterns() {
  if (!patternsDirty) return;
  const R = 4;
  const dTile = document.createElement("canvas");
  dTile.width = 22 * R; dTile.height = 22 * R;
  const dc = dTile.getContext("2d");
  dc.fillStyle = "rgba(38,34,28,.12)";
  dc.beginPath(); dc.arc(11 * R, 11 * R, 1 * R, 0, Math.PI * 2); dc.fill();
  patDot = ctx.createPattern(dTile, "repeat");

  const lTile = document.createElement("canvas");
  lTile.width = 8 * R; lTile.height = 28 * R;
  const lc = lTile.getContext("2d");
  lc.fillStyle = "rgba(38,34,28,.13)";
  lc.fillRect(0, 27 * R, 8 * R, 1 * R);
  patLine = ctx.createPattern(lTile, "repeat");

  try {
    const m = new DOMMatrix().scale(1 / R);
    patDot.setTransform(m);
    patLine.setTransform(m);
  } catch (e) { /* 未対応環境では等倍タイルとして機能 */ }
  patternsDirty = false;
}
function drawTemplateLive(c) {
  const w = cur.note.w, h = cur.note.h, bg = cur.note.bg;
  if (bg === "plain") return;
  buildPatterns();
  if (bg === "dot" && patDot) { c.fillStyle = patDot; c.fillRect(0, 0, w, h); return; }
  if (bg === "line" && patLine) { c.fillStyle = patLine; c.fillRect(0, 0, w, h); return; }
  if (bg === "grid4" || bg === "grid9") {
    c.strokeStyle = "rgba(38,34,28,.18)";
    c.lineWidth = 2 / (scale * view.z);
    const div = bg === "grid4" ? 2 : 3;
    for (let i = 1; i < div; i++) {
      c.beginPath(); c.moveTo(w * i / div, 0); c.lineTo(w * i / div, h); c.stroke();
      c.beginPath(); c.moveTo(0, h * i / div); c.lineTo(w, h * i / div); c.stroke();
    }
  }
}

/* ---- 画面合成：紙→テンプレート→ストローク層 ---- */
function render() {
  ctx.save();
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.restore();

  setViewTransform(ctx, view);
  ctx.fillStyle = paperColor;
  ctx.fillRect(0, 0, cur.note.w, cur.note.h);
  drawTemplateLive(ctx);
  ctx.strokeStyle = "rgba(38,34,28,.08)";
  ctx.lineWidth = 1 / (scale * view.z);
  ctx.strokeRect(0, 0, cur.note.w, cur.note.h);

  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 0, cur.note.w, cur.note.h);
  ctx.clip();
  if (viewIsCommitted()) {
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.drawImage(off, 0, 0);
  } else {
    const k = view.z / viewAtOff.z;
    ctx.setTransform(dpr * k, 0, 0, dpr * k,
                     dpr * (view.tx - viewAtOff.tx * k),
                     dpr * (view.ty - viewAtOff.ty * k));
    ctx.drawImage(off, 0, 0, off.width / dpr, off.height / dpr);
  }
  ctx.restore();
  setViewTransform(ctx, view);
  updateZoomChip();
}

function redrawAll() {
  offCtx.save(); offCtx.setTransform(1, 0, 0, 1, 0, 0);
  offCtx.clearRect(0, 0, off.width, off.height); offCtx.restore();
  setViewTransform(offCtx, view);
  for (const s of visibleStrokes(cur.strokes)) traceStroke(offCtx, s);
  viewAtOff = { ...view };
  render();
}
function commitView() {
  clampViewPan();
  redrawAll();
}

/* ---- ズームチップ ---- */
function updateZoomChip() {
  const chip = $("zoom-chip");
  const isDefault = Math.abs(view.z - 1) < 0.01 && Math.abs(view.tx) < 1 && Math.abs(view.ty) < 1;
  chip.classList.toggle("show", !isDefault);
  if (!isDefault) chip.textContent = Math.round(view.z * 100) + "% ⟲";
}
$("zoom-chip").addEventListener("click", () => {
  view = { z: 1, tx: 0, ty: 0 };
  commitView();
});

/* =====================================================
 * 入力処理（描画 / ピンチズーム / パームリジェクション）
 * ===================================================== */
const pointers = new Map();
let activeId = null;
let activeType = null;
let penSeen = false;
let live = null;
let lastMid = null;
let strokeStartT = 0;
let gesture = null;
let lastTwoFingerTap = 0;

function touchIds() {
  const out = [];
  for (const [id, p] of pointers) if (p.type === "touch") out.push(id);
  return out;
}
function toNote(e) {
  const r = canvas.getBoundingClientRect();
  let x = (e.clientX - r.left - view.tx) / (scale * view.z);
  let y = (e.clientY - r.top - view.ty) / (scale * view.z);
  x = Math.min(cur.note.w, Math.max(0, x));
  y = Math.min(cur.note.h, Math.max(0, y));
  return [Math.round(x * 10) / 10, Math.round(y * 10) / 10];
}
function cancelLive() {
  live = null; lastMid = null;
  activeId = null; activeType = null;
  render();
}
function startStroke(e) {
  activeId = e.pointerId;
  activeType = e.pointerType;
  strokeStartT = performance.now();
  document.activeElement && document.activeElement.blur();
  const isEraser = settings.tool === "eraser";
  const w = PEN_WIDTHS[settings.widthIdx] * (isEraser ? 4 : 1);
  live = { m: isEraser ? "e" : "d", c: PEN_COLORS[settings.colorIdx], w, p: toNote(e) };
  lastMid = null;
  setViewTransform(ctx, view);
}

/* ---- ピンチジェスチャー ---- */
function startGesture() {
  const ids = touchIds().slice(0, 2);
  if (ids.length < 2) return;
  const p1 = pointers.get(ids[0]), p2 = pointers.get(ids[1]);
  gesture = {
    ids,
    d0: Math.hypot(p2.x - p1.x, p2.y - p1.y) || 1,
    cx0: (p1.x + p2.x) / 2, cy0: (p1.y + p2.y) / 2,
    view0: { ...view },
    t0: performance.now(),
    maxMove: 0
  };
}
function updateGesture() {
  const p1 = pointers.get(gesture.ids[0]), p2 = pointers.get(gesture.ids[1]);
  if (!p1 || !p2) return;
  const d = Math.hypot(p2.x - p1.x, p2.y - p1.y) || 1;
  const cx = (p1.x + p2.x) / 2, cy = (p1.y + p2.y) / 2;
  gesture.maxMove = Math.max(gesture.maxMove,
    Math.hypot(cx - gesture.cx0, cy - gesture.cy0) + Math.abs(d - gesture.d0));

  const r = canvas.getBoundingClientRect();
  const v0 = gesture.view0;
  let z = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, v0.z * d / gesture.d0));
  const k = z / v0.z;
  view.z = z;
  view.tx = (cx - r.left) - ((gesture.cx0 - r.left) - v0.tx) * k;
  view.ty = (cy - r.top)  - ((gesture.cy0 - r.top)  - v0.ty) * k;
  clampViewPan();
  render();
}
function endGesture() {
  if (!gesture) return;
  const now = performance.now();
  const dt = now - gesture.t0;
  if (dt < 250 && gesture.maxMove < 12) {
    view = { ...gesture.view0 };
    if (now - lastTwoFingerTap < 400) {
      lastTwoFingerTap = 0;
      toggleFullscreen();
    } else {
      lastTwoFingerTap = now;
    }
  }
  gesture = null;
  commitView();
}

/* ---- Pointer Events ---- */
canvas.addEventListener("pointerdown", (e) => {
  if (e.clientX < EDGE_PX || e.clientX > window.innerWidth - EDGE_PX) return;
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY, type: e.pointerType });
  canvas.setPointerCapture(e.pointerId);
  if (e.pointerType === "pen") penSeen = true;

  if (e.pointerType === "touch") {
    if (gesture) { e.preventDefault(); return; }
    const ids = touchIds();
    if (ids.length === 2) {
      if (live && activeType === "pen") { e.preventDefault(); return; }
      if (live && activeType === "touch") {
        if (performance.now() - strokeStartT < GESTURE_GRACE) {
          cancelLive();
          startGesture();
        }
        e.preventDefault(); return;
      }
      startGesture();
      e.preventDefault(); return;
    }
    if (ids.length > 2) { e.preventDefault(); return; }
    if (penSeen) { e.preventDefault(); return; }
    if (activeId !== null) { e.preventDefault(); return; }
    startStroke(e);
    e.preventDefault(); return;
  }

  if (gesture) { gesture = null; commitView(); }
  if (activeId !== null && activeType === "touch") cancelLive();
  else if (activeId !== null) { e.preventDefault(); return; }
  startStroke(e);
  e.preventDefault();
}, { passive: false });

canvas.addEventListener("pointermove", (e) => {
  const rec = pointers.get(e.pointerId);
  if (rec) { rec.x = e.clientX; rec.y = e.clientY; }

  if (gesture && e.pointerType === "touch" && gesture.ids.includes(e.pointerId)) {
    updateGesture();
    e.preventDefault(); return;
  }
  if (e.pointerId !== activeId || !live) return;
  const events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
  for (const ev of events) {
    const [x, y] = toNote(ev);
    const n = live.p.length;
    const dx = x - live.p[n - 2], dy = y - live.p[n - 1];
    if (dx * dx + dy * dy < THIN_DIST * THIN_DIST) continue;
    live.p.push(x, y);
    drawLiveSegment();
  }
  e.preventDefault();
}, { passive: false });

function drawLiveSegment() {
  const p = live.p, n = p.length;
  if (n < 6) return;
  const midX = (p[n - 4] + p[n - 2]) / 2, midY = (p[n - 3] + p[n - 1]) / 2;
  if (live.m === "e") {
    const c = offCtx;
    c.strokeStyle = "#000";
    c.lineWidth = live.w;
    c.globalCompositeOperation = "destination-out";
    c.beginPath();
    if (lastMid) c.moveTo(lastMid[0], lastMid[1]); else c.moveTo(p[0], p[1]);
    c.quadraticCurveTo(p[n - 4], p[n - 3], midX, midY);
    c.stroke();
    c.globalCompositeOperation = "source-over";
    lastMid = [midX, midY];
    render();
    return;
  }
  ctx.strokeStyle = live.c;
  ctx.lineWidth = live.w;
  ctx.beginPath();
  if (lastMid) ctx.moveTo(lastMid[0], lastMid[1]);
  else ctx.moveTo(p[0], p[1]);
  ctx.quadraticCurveTo(p[n - 4], p[n - 3], midX, midY);
  ctx.stroke();
  lastMid = [midX, midY];
}

function endStroke(e) {
  if (e.pointerId !== activeId) return;
  activeId = null; activeType = null;
  if (!live) return;
  cur.strokes.push(live);
  cur.redo = [];
  traceStroke(offCtx, live);   // 表示用確定層へ（消しゴムは冪等なので二重適用でも安全）
  setBaseTransform();
  traceStroke(baseCtx, live);  // ベース層へも焼き付け＝保存・サムネはビットマップ参照のみ
  render();
  live = null; lastMid = null;
  thumbDirty = true;
  updateButtons();
  scheduleSave();
}
canvas.addEventListener("pointerup", (e) => {
  pointers.delete(e.pointerId);
  if (gesture && gesture.ids.includes(e.pointerId)) { endGesture(); return; }
  endStroke(e);
});
canvas.addEventListener("pointercancel", (e) => {
  pointers.delete(e.pointerId);
  if (gesture && gesture.ids.includes(e.pointerId)) { gesture = null; commitView(); return; }
  if (e.pointerId !== activeId) return;
  activeId = null; activeType = null; live = null; lastMid = null;
  render();
});

async function addFolder(name) {
  const t = name.trim();

  if (folders.some(f => f.name === t)) { toast("同じ名前のフォルダがあります"); return; }
  const f = { id: "f_" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6), name: t, createdAt: Date.now() };

async function deleteFolder(id) {
  const f = folders.find(x => x.id === id);
  if (!f) return;
  if (!confirm(`フォルダ「${f.name}」を削除しますか？\n（中のメモは「すべてのメモ」に残ります）`)) return;
  try {
    const affected = meta.filter(n => n.folderId === id);
    for (const n of affected) { n.folderId = null; await dbPut("notes", Object.assign({}, n)); }

    folders = folders.filter(x => x.id !== id);
    if (currentFolderId === id) { currentFolderId = null; settings.currentFolderId = null; saveSettings(); }
    if (cur && cur.note.folderId === id) { cur.note.folderId = null; updateNoteFolderLabel(); }
    renderFolderSheet();
    renderList();
    toast(`フォルダ「${f.name}」を削除しました`);

  }
}

/* ---- 画像として保存・共有（Web Share API＋DLフォールバック） ---- */
function drawTemplateStatic(c, w, h, bg) {
  c.save();
  if (bg === "dot") {
    c.fillStyle = "rgba(38,34,28,.12)";
    for (let y = 11; y < h; y += 22)
      for (let x = 11; x < w; x += 22) {
        c.beginPath(); c.arc(x, y, 1, 0, Math.PI * 2); c.fill();
      }
  } else if (bg === "line") {
    c.strokeStyle = "rgba(38,34,28,.13)"; c.lineWidth = 1;
    for (let y = 28; y < h; y += 28) {
      c.beginPath(); c.moveTo(0, y); c.lineTo(w, y); c.stroke();
    }
  } else if (bg === "grid4" || bg === "grid9") {
    c.strokeStyle = "rgba(38,34,28,.18)"; c.lineWidth = 2;
    const div = bg === "grid4" ? 2 : 3;
    for (let i = 1; i < div; i++) {
      c.beginPath(); c.moveTo(w * i / div, 0); c.lineTo(w * i / div, h); c.stroke();
      c.beginPath(); c.moveTo(0, h * i / div); c.lineTo(w, h * i / div); c.stroke();
    }
  }
  c.restore();
}
function buildExportCanvas() {
  const s = 2;
  const out = document.createElement("canvas");
  out.width = cur.note.w * s;
  out.height = cur.note.h * s;
  const c = out.getContext("2d");
  c.setTransform(s, 0, 0, s, 0, 0);
  c.fillStyle = "#FFFFFF";
  c.fillRect(0, 0, cur.note.w, cur.note.h);
  drawTemplateStatic(c, cur.note.w, cur.note.h, cur.note.bg);
  // ストロークはベース層のビットマップから合成（ループ不要）
  c.drawImage(base, 0, 0, base.width, base.height, 0, 0, cur.note.w, cur.note.h);
  return out;
}
$("btn-save-image").addEventListener("click", async () => {
  if (!cur) return;
  flushSave();
  try {
    const out = buildExportCanvas();
    const blob = await new Promise((res) => out.toBlob(res, "image/png"));
    if (!blob) throw new Error("画像の生成に失敗しました");
    const d = new Date();
    const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    const safeTitle = (cur.note.title || "memo").replace(/[\\/:*?"<>|\s]+/g, "_").slice(0, 30);
    const fileName = `${safeTitle}_${dateStr}.png`;
    const file = new File([blob], fileName, { type: "image/png" });

    // Web Share API：スマホ標準の共有メニュー（写真に保存 / LINEで送る 等）
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: cur.note.title });
        return;
      } catch (e) {
        if (e && e.name === "AbortError") return;   // ユーザーがキャンセル
        // 共有に失敗した場合はダウンロードへフォールバック
      }
    }
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.download = fileName;
    a.href = url;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
    toast("画像を保存しました");
  } catch (e) {
    console.error(e);
    toast("画像の保存に失敗しました");
  }
});

/* ---- 自動保存（デバウンス＋離脱時フラッシュ / IndexedDB非同期） ---- */
let chipTimer = null;
let savingBusy = false, savePending = false;
function setStatus(text, saving, instantHide) {
  const el = $("save-chip");
  el.textContent = text;
  el.classList.toggle("saving", !!saving);
  el.classList.add("show");
  clearTimeout(chipTimer);
  if (!saving) chipTimer = setTimeout(() => el.classList.remove("show"), instantHide ? 0 : 1400);
}
function scheduleSave() {
  if (!cur) return;
  setStatus("保存中…", true);
  clearTimeout(saveTimer);
  saveTimer = setTimeout(flushSave, 350);
}
async function flushSave() {
  clearTimeout(saveTimer); saveTimer = null;
  if (!cur || !dbReady) return;
  if (savingBusy) { savePending = true; return; }
  savingBusy = true;
  const snapshot = cur;   // 保存中に画面遷移してもこのメモを確実に書き込む
  try {
    snapshot.note.updatedAt = Date.now();
    if (thumbDirty) {
      snapshot.note.thumb = makeThumb();
      thumbDirty = false;
    }
    await dbPut("strokes", { id: snapshot.id, strokes: snapshot.strokes });
    await dbPut("notes", Object.assign({}, snapshot.note));
    if (cur === snapshot) setStatus("保存済み ✓", false);
  } catch (e) {
    console.error(e);
    if (cur === snapshot) setStatus("保存失敗", false);
    toast("保存に失敗しました。設定からエクスポートしてバックアップしてください。");
  } finally {
    savingBusy = false;
    if (savePending) { savePending = false; flushSave(); }
  }
}
/* サムネイル：ベース層ビットマップの縮小のみ＝ストローク数に関係なく一定コスト */
function makeThumb() {
  const tw = 320;
  const th = Math.round(tw * (cur.note.h / cur.note.w || 0.6));
  const t = document.createElement("canvas");
  t.width = tw; t.height = Math.min(th, 480);
  const tc = t.getContext("2d");
  tc.fillStyle = "#FDFCF9";
  tc.fillRect(0, 0, t.width, t.height);
  const s = tw / cur.note.w;
  tc.setTransform(s, 0, 0, s, 0, 0);
  drawTemplateStatic(tc, cur.note.w, cur.note.h, cur.note.bg);
  tc.drawImage(base, 0, 0, base.width, base.height, 0, 0, cur.note.w, cur.note.h);
  return t.toDataURL("image/jpeg", 0.55);
}
document.addEventListener("visibilitychange", () => { if (document.hidden) flushSave(); });
window.addEventListener("pagehide", flushSave);

$("btn-export").addEventListener("click", async () => {
  if (!dbReady) { toast("準備中です"); return; }
  try {

    const folderList = await dbGetAll("folders") || [];
    const data = { app: "tegaki-memo", version: 5, exportedAt: new Date().toISOString(), meta: notes, folders: folderList, notes: {} };
    for (const n of notes) {

    }
    const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    const d = new Date();
    a.download = `tegaki-backup_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}.json`;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 1000);
    toast("バックアップファイルを書き出しました");
  } catch (e) {
    console.error(e);
    toast("エクスポートに失敗しました");
  }
});

$("btn-import").addEventListener("click", () => $("import-file").click());
$("import-file").addEventListener("change", (e) => {
  const file = e.target.files[0];
  e.target.value = "";
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async () => {
    try {
      const data = JSON.parse(reader.result);
      if (data.app !== "tegaki-memo" || !Array.isArray(data.meta) || typeof data.notes !== "object") {
        throw new Error("format");
      }
      if (!confirm(`${data.meta.length}件のメモを取り込みます。\n同じIDのメモは上書きされます。よろしいですか？`)) return;
      if (Array.isArray(data.folders)) {
        for (const f of data.folders) {
          if (!f.id || !f.name) continue;
          await dbPut("folders", f);
          const fi = folders.findIndex(x => x.id === f.id);
          if (fi >= 0) folders[fi] = f; else folders.push(f);
        }
      }
      let count = 0;
      for (const n of data.meta) {
        if (!n.id) continue;
        if (!n.bg) n.bg = "dot";
        if (typeof n.isPinned !== "boolean") n.isPinned = false;
        if (!("folderId" in n)) n.folderId = null;
        await dbPut("notes", n);
        await dbPut("strokes", { id: n.id, strokes: data.notes[n.id] || [] });
        const i = meta.findIndex(m => m.id === n.id);
        if (i >= 0) meta[i] = n; else meta.push(n);
        count++;
      }
      renderList();
      toast(`${count}件のメモを復元しました`);
    } catch (err) {
      console.error(err);
      toast("読み込めませんでした。てがきメモのバックアップファイル（.json）を選択してください。");
    }
  };
  reader.readAsText(file);
});

function applyTheme(theme) {
  settings.theme = theme;
  document.documentElement.dataset.theme = theme;
  document.querySelector('meta[name="theme-color"]').content = theme === "dark" ? "#17181C" : "#F6F4EF";
  $("btn-theme-light").classList.toggle("selected", theme === "light");
  $("btn-theme-dark").classList.toggle("selected", theme === "dark");
  paperColor = theme === "dark" ? "#ECE9E2" : "#FDFCF9";
  saveSettings();
  if (cur && screens.editor.classList.contains("active") && canvas.width > 0) render();
}
$("btn-theme-light").addEventListener("click", () => applyTheme("light"));
$("btn-theme-dark").addEventListener("click", () => applyTheme("dark"));

$("btn-wipe").addEventListener("click", async () => {
  if (!dbReady) { toast("準備中です"); return; }
  if (!confirm(`すべてのメモ（${meta.length}件）を完全に削除します。\nこの操作は元に戻せません。\n\n本当に削除しますか？`)) return;
  try {
    await dbClear("notes");
    await dbClear("strokes");
    await dbClear("folders");
    meta = [];
    folders = [];
    currentFolderId = null;
    settings.currentFolderId = null;
    saveSettings();
    renderList();
    toast("全データを削除しました");
  } catch (e) {
    console.error(e);
    toast("削除に失敗しました");
  }
});

/* ---------- トースト ---------- */
let toastTimer = null;
function toast(msg) {
  const el = $("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2600);
}

/* ---------- 起動（非同期ブート） ---------- */
(async function boot() {
  setTool(settings.tool);
  refreshToolIndicators();
  buildPopovers();
  try {
    db = await openDB();
    await migrateFromLocalStorage();
    try {
      const s = await dbGet("settings", "app");
      if (s) { delete s.key; Object.assign(settings, s); }
    } catch {}
    meta = (await dbGetAll("notes")) || [];
    for (const n of meta) {
      if (typeof n.isPinned !== "boolean") n.isPinned = false;
      if (!("folderId" in n)) n.folderId = null;
    }
    folders = (await dbGetAll("folders")) || [];
    if (settings.currentFolderId && folders.some(f => f.id === settings.currentFolderId)) {
      currentFolderId = settings.currentFolderId;
    }
    dbReady = true;
  } catch (e) {
    console.error(e);
    toast("データベースを開けませんでした。プライベートブラウズ中は保存できない場合があります。");
  }
  applyTheme(settings.theme);
  setTool(settings.tool);
  refreshToolIndicators();
  renderList();
  applyRotationLock();
  const vLabel = $("app-version-label");
  if (vLabel) vLabel.textContent = APP_VERSION;
  const titleBadge = $("title-version-badge");
  if (titleBadge) titleBadge.textContent = "v" + APP_VERSION;
  const rotToggle = $("rotation-lock-toggle");
  if (rotToggle) {
    rotToggle.checked = !!settings.rotationLock;
    rotToggle.addEventListener("change", () => {
      settings.rotationLock = rotToggle.checked;
      saveSettings();
      applyRotationLock();
      toast(rotToggle.checked ? "縦向きに固定しました" : "自由に回転できるようになりました");
    });
  }
})();

/* =====================================================
 * 画面回転制御（凍結ロック方式）
 * - screen.orientation.lock() はブラウザ非対応・非スタンドアロン
 *   環境（通常のタブ表示など）では動作しないため補助的に試みるのみ。
 * - 確実に効くのは、ロックON時点の「縦向きの実ピクセルサイズ」を
 *   一度だけ記憶し、<html>/<body> に position:fixed + 固定px の
 *   width/height をインラインstyleで注入して画面を完全凍結する方式。
 *   横向きへビューポートが変化しても、見た目上のレイアウトも
 *   キャンバスのサイズも一切動かない（"崩れてから戻す"工程が存在しない）。
 * ===================================================== */
let frozenPortraitSize = null;   // { w, h } ロック時に一度だけ確定させる基準サイズ

function capturePortraitSize() {
  const w = window.innerWidth, h = window.innerHeight;
  // 現在すでに横向き（幅>高さ）の状態でロックした場合は、
  // 縦横を入れ替えて「あるべき縦向きサイズ」を推定する
  frozenPortraitSize = (w > h) ? { w: h, h: w } : { w, h };
}

function buildFreezeStyleText() {
  return `position:fixed; top:0; left:0; margin:0; padding:0; ` +
         `width:${frozenPortraitSize.w}px; height:${frozenPortraitSize.h}px; ` +
         `overflow:hidden; ` +
         // transform を持たせることで、配下の position:fixed 要素（.screen / FAB /
         // シート / ポップオーバー等）の基準（containing block）が
         // 「実際のビューポート」から「この body 自身」に切り替わる。
         // これが無いと、html/bodyを凍結しても中の fixed 要素だけが
         // 実機の横向きビューポートに追従してしまう。
         `transform: translateZ(0);`;
}

function freezePortrait() {
  capturePortraitSize();
  const html = document.documentElement;
  const body = document.body;
  html.classList.add("force-portrait");
  const style = buildFreezeStyleText();
  html.style.cssText += style;
  body.style.cssText += style;
  // 対応環境ではネイティブAPIのロックも補助的に試みる（失敗は無視）
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock("portrait-primary").catch(() => {});
  }
  // 凍結直後に一度だけ確定サイズでキャンバスを合わせる
  requestAnimationFrame(reflowCanvasSafely);
}

// 回転イベント発生時の保険：既に確定済みの凍結サイズ（frozenPortraitSize）を
// 再計測せず、そのままインラインstyleへ再アサートする。
// （※ capturePortraitSize は呼ばない＝横向きになった瞬間の寸法で
//    上書きしてしまうと元も子もないため）
function reapplyFreezeStyle() {
  if (!settings.rotationLock || !frozenPortraitSize) return;
  const style = buildFreezeStyleText();
  document.documentElement.style.cssText += style;
  document.body.style.cssText += style;
}

function unfreezePortrait() {
  const html = document.documentElement;
  const body = document.body;
  html.classList.remove("force-portrait");
  for (const prop of ["position", "top", "left", "margin", "padding", "width", "height", "overflow", "transform"]) {
    html.style.removeProperty(prop);
    body.style.removeProperty(prop);
  }
  frozenPortraitSize = null;
  if (screen.orientation && screen.orientation.unlock) {
    try { screen.orientation.unlock(); } catch (e) {}
  }
  scheduleCanvasReflow();
}

function applyRotationLock() {
  if (settings.rotationLock) freezePortrait();
  else unfreezePortrait();
}

/* =====================================================
 * PWA / Service Worker 登録
 * - APP_VERSION をクエリ付与して登録＝ブラウザのHTTPキャッシュを
 *   バイパスし、sw.js の内容が変わっていれば確実に更新検知させる
 * - 新しいSWが有効化(controllerchange)されたら、
 *   ユーザー操作なしで自動的に画面をリロードする
 * ===================================================== */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js?v=" + APP_VERSION)
      .then((reg) => {
        // 定期的に更新をチェック（バックグラウンド復帰時などに古いSWのままにならないように）
        setInterval(() => reg.update().catch(() => {}), 60 * 60 * 1000);
        document.addEventListener("visibilitychange", () => {
          if (!document.hidden) reg.update().catch(() => {});
        });
      })
      .catch((e) => console.error("Service Workerの登録に失敗しました:", e));
  });

  let refreshing = false;
  navigator.serviceWorker.addEventListener("controllerchange", () => {
    if (refreshing) return;
    refreshing = true;
    window.location.reload();
  });
}
</script>
